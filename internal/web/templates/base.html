<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1f2933">
  <title>{{block "title" .}}FutureSooth{{end}}</title>
  <link rel="manifest" href="/static/manifest.webmanifest">
  <link rel="stylesheet" href="/static/app.css">
  <!-- Apply a saved theme before first paint to avoid a flash of the wrong theme.
       With no saved choice, CSS falls back to the OS preference. -->
  <script>
    try { var t = localStorage.getItem("theme"); if (t) document.documentElement.dataset.theme = t; } catch (e) {}
  </script>
</head>
<body>
  <header class="site-header">
    <a class="site-header-link" href="/" aria-label="FutureSooth home">
      <span class="brand">FutureSooth</span>
      {{block "brand_sub" .}}{{end}}
      {{block "header_info" .}}{{end}}
    </a>
    <button class="theme-toggle" type="button" aria-label="Toggle theme">🌙</button>
  </header>
  <main class="container">
    {{template "content" .}}
  </main>
  <footer class="site-footer">
    <p>Created by <a href="https://github.com/hudsonsmelski/futuresooth">Hudson Smelski</a> with help from Claude Code</p>
  </footer>
  <script>
    (function () {
      var btn = document.querySelector(".theme-toggle");
      if (!btn) return;
      var root = document.documentElement;
      var prefersDark = window.matchMedia("(prefers-color-scheme: dark)");
      function effective() {
        return root.dataset.theme || (prefersDark.matches ? "dark" : "light");
      }
      function sync() {
        var dark = effective() === "dark";
        btn.textContent = dark ? "☀️" : "🌙";
        btn.setAttribute("aria-label", dark ? "Switch to light theme" : "Switch to dark theme");
      }
      btn.addEventListener("click", function () {
        var next = effective() === "dark" ? "light" : "dark";
        root.dataset.theme = next;
        try { localStorage.setItem("theme", next); } catch (e) {}
        sync();
      });
      // Keep the icon correct when following the OS and it changes.
      prefersDark.addEventListener("change", function () { if (!root.dataset.theme) sync(); });
      sync();
    })();
  </script>
</body>
</html>
