<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1f2933">
  <title>{{block "title" .}}FutureSooth{{end}}</title>
  <link rel="manifest" href="/static/manifest.webmanifest">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="site-header">
    <a class="site-header-link" href="/" aria-label="FutureSooth home">
      <span class="brand">FutureSooth</span>
      {{block "brand_sub" .}}{{end}}
      {{block "header_info" .}}{{end}}
    </a>
  </header>
  <main class="container">
    {{template "content" .}}
  </main>
  <footer class="site-footer">
    <p><a href="https://github.com/hudsonsmelski/futuresooth">hudsonsmelski</a></p>
  </footer>
</body>
</html>
